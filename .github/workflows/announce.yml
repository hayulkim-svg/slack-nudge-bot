name: nudge-announce

# Runs once a day at 00:00 UTC (09:00 KST) and announces any reminder whose
# Korean-working-calendar schedule (config.json "schedule" block) makes it due
# today — e.g. expense-claim on the 3rd working day, card-withdrawal the day
# before the 23rd rolled to a working day. Does nothing on non-send days.
# A manual run with a reminder_id announces that reminder immediately, bypassing
# the schedule. State (tracked.json) is committed back so the scheduled check
# takes over the nudging.

on:
  schedule:
    - cron: '0 0 * * *' # daily 00:00 UTC == 09:00 KST
  workflow_dispatch:
    inputs:
      reminder_id:
        description: 'Announce this reminder id now, bypassing the schedule (e.g. expense-claim)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: nudge-state
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Announce due reminders
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DISPATCH_ID: ${{ inputs.reminder_id }}
        run: |
          if [ -n "$DISPATCH_ID" ]; then
            node src/announce.js "$DISPATCH_ID"
          else
            node src/dailyAnnounce.js
          fi
      - name: Commit updated state
        run: |
          if [ -n "$(git status --porcelain tracked.json)" ]; then
            git config user.name "nudge-bot"
            git config user.email "actions@users.noreply.github.com"
            git add tracked.json
            git commit -m "chore: announce, seed nudge state [skip ci]"
            git push
          else
            echo "No state change."
          fi
