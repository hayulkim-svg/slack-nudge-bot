name: nudge-announce

# Manually-triggered: posts the announcement from config.json and seeds tracking.
# Run this from the Actions tab when you want to start a new reminder campaign.
# State (tracked.json) is committed back so the scheduled check takes over.

on:
  workflow_dispatch:
    inputs:
      reminder_id:
        description: 'Reminder id from config.json (e.g. expense-claim, card-withdrawal)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: nudge-state
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run announce
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REMINDER_ID: ${{ inputs.reminder_id }}
        run: node src/announce.js
      - name: Commit updated state
        run: |
          if [ -n "$(git status --porcelain tracked.json)" ]; then
            git config user.name "nudge-bot"
            git config user.email "actions@users.noreply.github.com"
            git add tracked.json
            git commit -m "chore: announce, seed nudge state [skip ci]"
            git push
          else
            echo "No state change."
          fi
